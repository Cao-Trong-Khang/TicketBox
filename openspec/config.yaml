schema: spec-driven

context: |
  Project: TicketBox - High-Concurrency Concert Ticketing System
  Domain: Concert ticketing, event management, payment processing, notifications, AI artist bio generation, VIP guest-list import, and offline venue check-in.

  Global source-of-truth documents:

  - Proposal: `openspec/changes/archive/2026-06-04-ticketbox-blueprint/proposal.md`
  - Technical Design: `openspec/changes/archive/2026-06-04-ticketbox-blueprint/design.md`

  CRITICAL ALIGNMENT RULE:
  Before generating any proposal, design, spec, or task for a new feature, you MUST read and align with the global Proposal and Technical Design documents.
  Feature-level documents MUST NOT contradict the global architecture, database design, access-control model, or protection mechanisms.
  If a feature requires changes to the global Proposal or Technical Design, explicitly call it out as an open question instead of silently inventing a new architecture.

  Architectural style:

  - System level: Client-Server Architecture.
  - Backend organization: Layered Architecture.
  - Asynchronous workflows: Event-driven Architecture using Kafka.
  - Backend implementation: NestJS TypeScript modular monolith.
  - Local execution: Docker Compose.

  Main runtime components:

  - Web Application: audience area and organizer admin area.
  Check-in Mobile App: Native Android (Kotlin) utilizing Room Database for offline-first storage and Jetpack Compose for UI.
  - Backend API: NestJS modular monolith.
  - Background Workers: asynchronous jobs for notifications, reminders, CSV import, AI bio generation, and analytics.
  - PostgreSQL: authoritative transactional database.
  - Redis: caching, rate limiting, quota pre-checks, short-lived coordination, and temporary state.
  - Kafka: message broker for asynchronous workflows.
  - External systems: VNPAY/MoMo, Email Provider, AI Model, Sponsor CSV Files.

  Core technical constraints:

  - PostgreSQL is the source of truth for users, concerts, ticket types, orders, payments, tickets, check-ins, VIP guests, AI content, notifications, and audit logs.
  - Redis MUST NOT be treated as the final authority for ticket ownership, payment state, or check-in validity.
  - Checkout-related features MUST prevent overselling and enforce per-user purchase limits under concurrent requests.
  - Payment-related features MUST be idempotent and MUST prevent duplicate charge attempts and duplicate ticket issuance.
  - Payment gateway failures MUST NOT break public concert browsing or ticket availability viewing.
  - Read-heavy public concert APIs SHOULD use Redis cache-aside where applicable.
  - Offline check-in features MUST preserve local scan logs and resolve duplicate or conflicting scans during synchronization.
  - Sponsor VIP guest-list integration is limited to scheduled CSV import; do not invent direct API, webhook, or database integration with sponsor systems.
  - AI artist bio generation is asynchronous and MUST expose processing status, fallback behavior, and organizer edit/review capability.
  - Do not introduce new databases, cloud-only services, external managed infrastructure, or real payment settlement unless explicitly requested.

rules:
  proposal:
    - MUST clearly identify which user roles are impacted (Audience, Organizer, or Check-in Staff).
    - MUST explicitly state whether the feature interacts with external systems such as VNPAY/MoMo, Email Provider, AI Model, or Sponsor CSV Files.
    - MUST state which existing global goals, risks, or constraints the feature supports.
    - MUST stay within the global project scope defined in the global Proposal.
    - MUST mark any conflict with the global Proposal or Technical Design as an open question.
    - MUST NOT introduce capabilities that are outside the global scope, such as cloud production deployment, real payment settlement, direct sponsor API integration, or seat-level booking.

  design:
    - MUST read and align with the global Technical Design before proposing feature-level design.
    - MUST describe how the feature fits into the existing Client-Server, Layered, and Event-driven architecture.
    - MUST identify existing components involved, such as Web Application, Check-in Mobile App, Backend API, Background Workers, PostgreSQL, Redis, Kafka, or external systems.
    - MUST reference existing PostgreSQL tables from the global design when possible.
    - MUST only propose new tables, columns, indexes, events, or jobs when the feature clearly requires them.
    - MUST identify relevant access-control checks, including role, permission, ownership, or assignment checks.
    - MUST document relevant protection mechanisms only when applicable to the feature, such as rate limiting, caching, idempotency, inventory locking, payment circuit breaker behavior, offline sync conflict handling, CSV validation, or AI fallback behavior.
    - MUST NOT introduce new architectural styles, databases, message brokers, or external services unless explicitly justified as a proposed change to the global design.

  specs:
    - |
      MUST follow the following course-required structure:
      ## Specification: [Feature Name]
      ## Description
      ## Main Flow
      ## Failure Scenarios
      ## Constraints
      ## Acceptance Criteria
    - Description MUST explain what the feature does and which user role uses it.
    - Main Flow MUST describe the steps in order and mention the participating components, such as Web Application, Check-in Mobile App, Backend API, PostgreSQL, Redis, Kafka, Background Worker, or external system.
    - Failure Scenarios MUST include relevant failure cases, such as timeout, invalid input, permission denied, Redis failure, Kafka failure, payment callback duplication, stale cache, offline sync conflict, malformed CSV, or AI unavailable where applicable.
    - Constraints MUST include relevant security, consistency, performance, availability, and data integrity constraints.
    - Acceptance Criteria MUST define how the team can verify the feature works correctly through tests or demo scenarios.
    - SHOULD include GIVEN / WHEN / THEN scenarios inside Acceptance Criteria when it improves clarity.
    - MUST define required RBAC permissions for protected user actions.
    - MUST identify which existing global architecture components the feature depends on.
    - MUST NOT include implementation tasks inside `spec.md`.
    - MUST NOT contradict the global Proposal or Technical Design.

  tasks:
    - MUST map each implementation task back to one or more Acceptance Criteria in the feature spec.
    - MUST ensure all implementation steps can be run locally via Docker Compose.
    - MUST include database migration or seed-data tasks when the feature requires new data.
    - MUST include test or demo tasks for happy paths and important failure scenarios.
    - MUST not implement behavior that is not described in the feature spec unless the spec is updated first.
