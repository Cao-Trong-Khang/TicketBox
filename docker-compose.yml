services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ticketbox
      POSTGRES_DB: ticketbox
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketbox -d ticketbox"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.1.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:5173
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ticketbox
      POSTGRES_DB: ticketbox
      DATABASE_URL: postgresql://ticketbox:ticketbox@postgres:5432/ticketbox?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JWT_ACCESS_SECRET: local-development-jwt-secret
      JWT_ACCESS_TOKEN_TTL: 1h
      CHECK_IN_QR_HMAC_SECRET: local-development-check-in-qr-secret-1234567890
      CHECK_IN_QR_ISSUER: ticketbox
      VIP_CSV_SOURCE_DIR: /app/prisma/demo-sponsor-csv
      VIP_CSV_DEFAULT_SOURCE_NAME: SPONSOR_CSV
      VIP_IMPORT_MAX_FILE_SIZE_BYTES: 10485760
      VIP_IMPORT_MAX_ROWS: 10000
      VIP_IMPORT_BATCH_SIZE: 100
      VIP_IMPORT_QUEUE_FAIL: 0
    ports:
      - "3000:3000"
    volumes:
      - ./backend/prisma/demo-sponsor-csv:/app/prisma/demo-sponsor-csv:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  vip-import-worker:
    build:
      context: ./backend
    command: npm run vip-imports:worker -- --source-dir=/app/prisma/demo-sponsor-csv
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ticketbox
      POSTGRES_DB: ticketbox
      DATABASE_URL: postgresql://ticketbox:ticketbox@postgres:5432/ticketbox?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JWT_ACCESS_SECRET: local-development-jwt-secret
      JWT_ACCESS_TOKEN_TTL: 1h
      CHECK_IN_QR_HMAC_SECRET: local-development-check-in-qr-secret-1234567890
      CHECK_IN_QR_ISSUER: ticketbox
      VIP_CSV_SOURCE_DIR: /app/prisma/demo-sponsor-csv
      VIP_CSV_DEFAULT_SOURCE_NAME: SPONSOR_CSV
      VIP_IMPORT_MAX_FILE_SIZE_BYTES: 10485760
      VIP_IMPORT_MAX_ROWS: 10000
      VIP_IMPORT_BATCH_SIZE: 100
      VIP_IMPORT_WORKER_BATCH_LIMIT: 10
      VIP_IMPORT_SCAN_INTERVAL_MS: 60000
      VIP_IMPORT_WORKER_POLL_INTERVAL_MS: 10000
      VIP_IMPORT_QUEUE_FAIL: 0
    volumes:
      - ./backend/prisma/demo-sponsor-csv:/app/prisma/demo-sponsor-csv:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data_18:
